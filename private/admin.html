<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<link rel="stylesheet" href="/style.css">
</head>

<body>

<header class="header">
  <a class="logo" href="/">
    <img src="/logo.jpeg">
    <span>Admin Panel</span>
  </a>

  <div class="status">
    <span class="dot"></span>
    Admin actif
  </div>

  <button class="btn btn-danger" onclick="logout()">Logout</button>
</header>

<div class="container">

  <div class="tabs">
    <button class="tab active" onclick="show('convoys')">Convois</button>
    <button class="tab" onclick="show('team')">Équipe</button>
  </div>

  <!-- CONVOYS -->
  <div id="convoys">

    <div class="card">
      <h3>Nouveau convoi</h3>

      <input id="title" placeholder="Titre">
      <input id="start" placeholder="Départ">
      <input id="end" placeholder="Destination">
      <input id="time" placeholder="Heure">
      <input id="date" type="date">

      <button class="btn" onclick="addConvoy()">Ajouter</button>
    </div>

    <div id="convoyList"></div>
  </div>

  <!-- TEAM -->
  <div id="team" style="display:none">

    <div class="card">
      <h3>Ajouter membre</h3>

      <input id="name" placeholder="Nom">
      <input id="role" placeholder="Rôle">

      <input type="file" id="avatarFile">
      <input id="avatarUrl" placeholder="URL avatar (optionnel)">

      <button class="btn" onclick="addMember()">Ajouter</button>
    </div>

    <div id="teamList"></div>
  </div>

</div>

<script>

let convoys = [];
let team = [];

function show(tab){
  document.getElementById("convoys").style.display = tab==="convoys"?"block":"none";
  document.getElementById("team").style.display = tab==="team"?"block":"none";
}

/* LOAD */
async function load(){
  convoys = await fetch("/api/convoys",{credentials:"include"}).then(r=>r.json());
  team = await fetch("/api/team",{credentials:"include"}).then(r=>r.json());
  render();
}

/* RENDER */
function render(){

  document.getElementById("convoyList").innerHTML =
    convoys.map((c,i)=>`
      <div class="card">
        <h3>${c.title || "Sans titre"}</h3>
        <p>${c.start} → ${c.end}</p>
        <p>${c.time}</p>

        <button class="btn-danger" onclick="delConvoy(${i})">Supprimer</button>
      </div>
    `).join("");

  document.getElementById("teamList").innerHTML =
    team.map((m,i)=>`
      <div class="card">
        <img src="${m.avatar || 'https://via.placeholder.com/80'}"
             style="width:60px;height:60px;border-radius:50%;"><br>

        <b>${m.name}</b><br>
        ${m.role}<br><br>

        <button class="btn-danger" onclick="delMember(${i})">Supprimer</button>
      </div>
    `).join("");
}

/* CONVOY */
function addConvoy(){

  const c = {
    title: title.value.trim(),
    start: start.value.trim(),
    end: end.value.trim(),
    time: time.value.trim(),
    date: date.value
  };

  if(!c.title || !c.start || !c.end){
    alert("Remplis les champs");
    return;
  }

  convoys.push(c);
  saveConvoys();
}

function delConvoy(i){
  convoys.splice(i,1);
  saveConvoys();
}

function saveConvoys(){
  fetch("/api/convoys",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    credentials:"include",
    body:JSON.stringify(convoys)
  }).then(load);
}

/* TEAM */
function fileToBase64(file){
  return new Promise(r=>{
    const fr=new FileReader();
    fr.onload=()=>r(fr.result);
    fr.readAsDataURL(file);
  });
}

async function addMember(){

  let avatar = "";

  if(avatarFile.files[0]){
    avatar = await fileToBase64(avatarFile.files[0]);
  } else {
    avatar = avatarUrl.value.trim();
  }

  const m = {
    name: name.value.trim(),
    role: role.value.trim(),
    avatar
  };

  if(!m.name || !m.role){
    alert("Nom + rôle requis");
    return;
  }

  team.push(m);
  saveTeam();
}

function delMember(i){
  team.splice(i,1);
  saveTeam();
}

function saveTeam(){
  fetch("/api/team",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    credentials:"include",
    body:JSON.stringify(team)
  }).then(load);
}

/* LOGOUT */
function logout(){
  fetch("/logout",{credentials:"include"})
  .then(()=>location.href="/");
}

load();

</script>

</body>
</html>
