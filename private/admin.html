<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>

<style>
/* =========================
   GLOBAL
========================= */

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f0f0f;
  color: white;
}

/* =========================
   HEADER
========================= */

.header {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 65px;

  display: flex;
  justify-content: space-between;
  align-items: center;

  padding: 0 20px;
  background: rgba(17,17,17,0.9);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(255,255,255,0.06);
  z-index: 1000;
}

.header b {
  font-size: 16px;
}

.btn-danger {
  background: #e74c3c;
  color: white;
  border: none;
  padding: 8px 12px;
  border-radius: 8px;
  cursor: pointer;
  transition: 0.2s;
}

.btn-danger:hover {
  transform: translateY(-2px);
}

/* =========================
   LAYOUT
========================= */

.container {
  max-width: 1000px;
  margin: auto;
  padding: 100px 20px 40px;
}

/* =========================
   TABS
========================= */

.tabs {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
}

.tab {
  padding: 10px 14px;
  background: #1c1c1c;
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 10px;
  cursor: pointer;
  transition: 0.2s;
  color: rgba(255,255,255,0.7);
}

.tab:hover {
  transform: translateY(-2px);
  color: white;
}

.tab.active {
  background: #2ecc71;
  color: black;
  font-weight: bold;
}

/* =========================
   CARDS
========================= */

.card {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  padding: 16px;
  border-radius: 14px;
  margin-bottom: 15px;
  backdrop-filter: blur(10px);
  transition: 0.25s ease;
}

.card:hover {
  transform: translateY(-3px);
  border-color: rgba(46,204,113,0.4);
}

/* =========================
   INPUTS
========================= */

input {
  width: 100%;
  padding: 10px;
  margin: 6px 0;

  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 10px;
  color: white;
  outline: none;
}

input:focus {
  border-color: #2ecc71;
}

/* =========================
   BUTTONS
========================= */

button {
  padding: 10px 12px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  transition: 0.2s;
}

.btn {
  background: #2ecc71;
  color: black;
  font-weight: bold;
}

.btn:hover {
  transform: translateY(-2px);
}

/* =========================
   TEAM IMAGE
========================= */

.card img {
  border-radius: 50%;
  margin-bottom: 10px;
}

/* =========================
   RESPONSIVE
========================= */

@media (max-width:768px) {
  .tabs {
    flex-direction: column;
  }
}
</style>
</head>

<body>

<div class="header">
  <b>Admin Panel</b>
  <button onclick="logout()" class="btn-danger">Logout</button>
</div>

<div class="container">

<div class="tabs">
  <div class="tab active" onclick="show('convoys')">Convois</div>
  <div class="tab" onclick="show('team')">Équipe</div>
</div>

<!-- ===================== CONVOIS ===================== -->
<div id="convoys">

  <div class="card">
    <h3>Nouveau convoi</h3>

    <input id="title" placeholder="Titre">
    <input id="start" placeholder="Départ">
    <input id="end" placeholder="Destination">
    <input id="time" placeholder="Heure">
    <input id="date" type="date">

    <button class="btn" onclick="addConvoy()">Ajouter</button>
  </div>

  <div id="convoyList"></div>
</div>

<!-- ===================== TEAM ===================== -->
<div id="team" style="display:none">

  <div class="card">
    <h3>Ajouter membre</h3>

    <input id="name" placeholder="Nom">
    <input id="role" placeholder="Rôle">

    <input type="file" id="avatarFile" accept="image/*">
    <input id="avatarUrl" placeholder="URL avatar">

    <button class="btn" onclick="addMember()">Ajouter</button>
  </div>

  <div id="teamList"></div>
</div>

</div>

<script>

let convoys = [];
let team = [];

function show(tab){
  document.getElementById("convoys").style.display = tab==="convoys"?"block":"none";
  document.getElementById("team").style.display = tab==="team"?"block":"none";
}

/* ===================== LOAD ===================== */
async function load(){
  convoys = await fetch("/api/convoys", { credentials:"include" }).then(r=>r.json());
  team = await fetch("/api/team", { credentials:"include" }).then(r=>r.json());
  render();
}

/* ===================== RENDER ===================== */
function render(){

  document.getElementById("convoyList").innerHTML =
    convoys.map((c,i)=>`
      <div class="card">
        <b>${c.title || "Sans titre"}</b><br>
        ${c.start || ""} → ${c.end || ""}<br><br>
        <button class="btn-danger" onclick="delConvoy(${i})">Supprimer</button>
      </div>
    `).join("");

  document.getElementById("teamList").innerHTML =
    team.map((m,i)=>`
      <div class="card">
        <img src="${m.avatar || 'https://via.placeholder.com/80'}" width="60" height="60"><br>
        <b>${m.name}</b><br>
        ${m.role}<br><br>
        <button class="btn-danger" onclick="delMember(${i})">Supprimer</button>
      </div>
    `).join("");
}

/* ===================== CONVOY ===================== */
function addConvoy(){

  const c = {
    title: document.getElementById("title").value.trim(),
    start: document.getElementById("start").value.trim(),
    end: document.getElementById("end").value.trim(),
    time: document.getElementById("time").value.trim(),
    date: document.getElementById("date").value
  };

  if(!c.title || !c.start || !c.end){
    alert("Remplis les champs convoi");
    return;
  }

  convoys.push(c);
  saveConvoys();
}

function delConvoy(i){
  convoys.splice(i,1);
  saveConvoys();
}

async function saveConvoys(){
  await fetch("/api/convoys", {
    method:"POST",
    credentials:"include",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify(convoys)
  });

  load();
}

/* ===================== TEAM ===================== */
async function addMember(){

  const file = document.getElementById("avatarFile").files[0];
  const url = document.getElementById("avatarUrl").value.trim();

  let avatar = "";

  if(file){
    const reader = new FileReader();
    reader.onload = () => {
      avatar = reader.result;
      saveMember(avatar);
    };
    reader.readAsDataURL(file);
  } else {
    saveMember(url);
  }
}

function saveMember(avatar){

  const m = {
    name: document.getElementById("name").value.trim(),
    role: document.getElementById("role").value.trim(),
    avatar
  };

  if(!m.name || !m.role){
    alert("Nom + rôle obligatoires");
    return;
  }

  team.push(m);
  saveTeam();
}

function delMember(i){
  team.splice(i,1);
  saveTeam();
}

async function saveTeam(){
  await fetch("/api/team", {
    method:"POST",
    credentials:"include",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify(team)
  });

  load();
}

/* ===================== LOGOUT ===================== */
function logout(){
  fetch("/logout", { credentials:"include" })
    .then(()=>location.href="/");
}

load();

</script>

</body>
</html>
