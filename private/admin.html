<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel - TransAuvergne</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f0f0f;
    color: white;
}

/* HEADER */

* {
    box-sizing: border-box;
}
    
.header {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 70px;

    padding: 0 20px;

    display: flex;
    justify-content: space-between;
    align-items: center;

    background: rgba(10,10,10,0.75);
    backdrop-filter: blur(10px);
    z-index: 1000;
}
    
.logo { font-weight: bold; }

.logout {
    margin-left: auto;
    padding: 8px 14px;
    background: #e74c3c;
    border: none;
    border-radius: 8px;
    color: white;
    cursor: pointer;
    white-space: nowrap;
}

/* LAYOUT */
.container {
    padding: 100px 20px 40px;
    max-width: 1200px;
    margin: auto;
}

/* STATS */
.stats {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
}

.stat {
    flex: 1;
    padding: 15px;
    border-radius: 12px;
    background: rgba(255,255,255,0.05);
    text-align: center;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
}

.card {
    background: rgba(255,255,255,0.05);
    padding: 20px;
    border-radius: 12px;
}

/* INPUTS */
input, select {
    width: 100%;
    padding: 10px;
    margin-top: 6px;
    margin-bottom: 10px;
    border-radius: 8px;
    border: none;
    background: #1a1a1a;
    color: white;
}

/* BUTTONS */
button {
    padding: 10px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-weight: bold;
}

.btn { background: #5865F2; color: white; }
.btn:hover { background: #4752c4; }

.btn-danger { background: #e74c3c; color: white; }
.btn-small { padding: 6px 10px; font-size: 12px; margin-top: 5px; }

/* LIST */
.convoy {
    background: rgba(255,255,255,0.04);
    padding: 12px;
    border-radius: 10px;
    margin-bottom: 10px;
}

small { color: #aaa; }
</style>
</head>

<body>

<header class="header">
    <div class="logo">🚛 Admin Panel</div>
    <button class="logout" onclick="logout()">Déconnexion</button>
</header>

<div class="container">

<!-- STATS -->
<div class="stats">
    <div class="stat" id="t"></div>
    <div class="stat" id="o"></div>
    <div class="stat" id="c"></div>
</div>

<div class="grid">

    <!-- FORM -->
    <div class="card">
        <h2>➕ Nouveau convoi</h2>

        <input id="title" placeholder="Titre">
        <input id="start" placeholder="Départ">
        <input id="end" placeholder="Destination">
        <input id="time" placeholder="Heure">
        <input id="date" type="date">

        <select id="status">
            <option value="ouvert">Ouvert</option>
            <option value="complet">Complet</option>
            <option value="annule">Annulé</option>
        </select>

        <button class="btn" onclick="addConvoy()">Ajouter</button>
    </div>

    <!-- LIST -->
    <div class="card">
        <h2>📦 Convois</h2>
        <div id="list"></div>
    </div>

</div>

</div>

<script>

let convoys = [];

/* LOAD */
function loadConvoys() {
    fetch("/api/convoys", { credentials:"include" })
    .then(r => r.json())
    .then(data => {
        convoys = Array.isArray(data) ? data : [];
        render();
    });
}

/* SAVE */
function save() {
    fetch("/api/convoys", {
        method:"POST",
        credentials:"include",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify(convoys)
    });
}

/* ADD */
function addConvoy() {
    const c = {
        title: document.getElementById("title").value,
        start: document.getElementById("start").value,
        end: document.getElementById("end").value,
        time: document.getElementById("time").value,
        date: document.getElementById("date").value,
        status: document.getElementById("status").value || "ouvert"
    };

    convoys.push(c);
    save();
    render();
}

/* DELETE */
function deleteConvoy(i) {
    convoys.splice(i,1);
    save();
    render();
}

/* RENDER */
function render() {
    const container = document.getElementById("list");
    container.innerHTML = "";

    // stats correctes
    const open = convoys.filter(c => (c.status || "ouvert") === "ouvert").length;
    const full = convoys.filter(c => c.status === "complet").length;

    document.getElementById("t").innerHTML = `Total<br>${convoys.length}`;
    document.getElementById("o").innerHTML = `Ouverts<br>${open}`;
    document.getElementById("c").innerHTML = `Complets<br>${full}`;

    // affichage
    convoys.forEach((c,i)=>{
        container.innerHTML += `
        <div class="convoy">
            <b>${c.title}</b><br>
            ${c.start} → ${c.end}<br>
            ${c.time} - ${c.date}<br>
            <small>${c.status || "ouvert"}</small><br>

            <button class="btn-danger btn-small" onclick="deleteConvoy(${i})">Supprimer</button>
        </div>
        `;
    });
}

/* LOGOUT */
function logout(){
    fetch("/logout", { credentials:"include" })
    .then(()=> location.href="/");
}

loadConvoys();
</script>

</body>
</html>
