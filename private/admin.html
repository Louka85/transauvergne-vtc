<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<style>
body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:
radial-gradient(circle at top left,#2ecc7120,transparent 40%),
radial-gradient(circle at bottom right,#00c3ff15,transparent 40%),
#0b0f14;
color:white;
}

.header{
position:fixed;
top:0;
left:0;
width:100%;
height:70px;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 25px;
backdrop-filter:blur(15px);
background:rgba(15,15,15,.75);
border-bottom:1px solid rgba(255,255,255,.08);
z-index:999;
box-sizing:border-box;
}

.header b{
font-size:20px;
color:#2ecc71;
letter-spacing:1px;
}

.container{
padding:110px 20px 40px;
max-width:1200px;
margin:auto;
}

.tabs{
display:flex;
gap:12px;
margin-bottom:25px;
}

.tab{
padding:12px 18px;
border-radius:12px;
background:rgba(255,255,255,.04);
border:1px solid rgba(255,255,255,.06);
cursor:pointer;
transition:.25s;
}

.tab:hover{
transform:translateY(-2px);
background:rgba(255,255,255,.08);
}

.tab.active{
background:#2ecc71;
color:#000;
font-weight:700;
box-shadow:0 0 20px rgba(46,204,113,.35);
}

.card{
background:rgba(255,255,255,.03);
border:1px solid rgba(255,255,255,.06);
backdrop-filter:blur(12px);
border-radius:18px;
padding:18px;
transition:.25s;
}

.card:hover{
transform:translateY(-3px);
border-color:rgba(46,204,113,.35);
box-shadow:0 0 25px rgba(46,204,113,.12);
}

.card h3{
margin-top:0;
color:#2ecc71;
}

input,
textarea{
width:100%;
padding:12px;
margin:6px 0;
border-radius:12px;
border:1px solid rgba(255,255,255,.08);
background:#111722;
color:white;
box-sizing:border-box;
transition:.2s;
}

input:focus,
textarea:focus{
outline:none;
border-color:#2ecc71;
box-shadow:0 0 12px rgba(46,204,113,.25);
}

textarea{
min-height:100px;
resize:vertical;
}

button{
border:none;
border-radius:12px;
cursor:pointer;
transition:.2s;
}

.btn{
background:#2ecc71;
color:black;
font-weight:700;
padding:12px 18px;
}

.btn:hover{
transform:translateY(-2px);
box-shadow:0 0 20px rgba(46,204,113,.4);
}

.btn-danger{
background:#e74c3c;
color:white;
padding:10px 15px;
}

.btn-danger:hover{
box-shadow:0 0 18px rgba(231,76,60,.4);
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:20px;
}

.card img{
border:3px solid rgba(46,204,113,.4);
object-fit:cover;
}

@media(max-width:700px){

```
.header{
    padding:0 15px;
}

.tabs{
    flex-wrap:wrap;
}

.grid{
    grid-template-columns:1fr;
}
```

}

</style>
</head>

<body>

<div class="header">
    <b>Admin Panel</b>
    <button class="btn-danger" onclick="logout()">Logout</button>
</div>

<div class="container">
<div class="card" style="margin-bottom:20px;">
    <h2>🚛 Tableau de bord TransAuvergne</h2>
    <p>Gestion des convois, de l'équipe et du site VTC.</p>
</div>
<!-- TABS -->
<div class="tabs">
    <div class="tab active" onclick="show('convoys')">Convois</div>
    <div class="tab" onclick="show('team')">Équipe</div>
    <div class="tab" onclick="show('drivers')">Conducteurs</div>
</div>

<!-- ================= CONVOYS ================= -->
<div id="convoys">

<div class="card">
<h3>Nouveau convoi</h3>

<input id="title" placeholder="Titre">
<input id="start" placeholder="Départ">
<input id="end" placeholder="Destination">
<input id="time" placeholder="Heure">
<input id="date" type="date">

<input id="server" placeholder="Serveur TMP">
<input id="meeting" placeholder="Rassemblement">
<input id="meetingTime" placeholder="Heure rassemblement">
<input id="distance" placeholder="Distance (km)">
<input id="cargo" placeholder="Fret">
<input id="dlc" placeholder="DLC">
<textarea id="description" placeholder="Description"></textarea>

<button class="btn" onclick="addConvoy()">Ajouter convoi</button>
</div>

<div id="convoyList" class="grid"></div>

</div>

<!-- ================= TEAM ================= -->
<div id="team" style="display:none">

<div class="card">
<h3>Ajouter membre</h3>

<input id="name" placeholder="Nom">
<input id="role" placeholder="Rôle">
<input type="file" id="avatarFile">
<input id="avatarUrl" placeholder="Lien image (optionnel)">

<button class="btn" onclick="addMember()">Ajouter membre</button>
</div>

<div id="teamList" class="grid"></div>

</div>

<!-- ================= DRIVERS ================= -->

<div id="drivers" style="display:none">

<div class="card">

<h3>🚛 Ajouter un conducteur</h3>


<input id="driverUsername" placeholder="Identifiant">


<input id="driverPassword" type="password" placeholder="Mot de passe">


<input id="driverName" placeholder="Nom">


<input id="driverDiscord" placeholder="Discord">


<input id="driverTruck" placeholder="Camion">


<button class="btn" onclick="createDriver()">
Créer le compte
</button>


<p id="driverMessage"></p>


</div>

<div id="driversList"></div>
    
</div>
    
</div>

<script>

/* NAV */
function show(tab){

document.getElementById("convoys").style.display =
tab==="convoys" ? "block" : "none";

document.getElementById("team").style.display =
tab==="team" ? "block" : "none";

document.getElementById("drivers").style.display =
tab==="drivers" ? "block" : "none";

}

/* LOGOUT */
function logout(){
    fetch("/logout",{credentials:"include"})
    .then(()=>location.href="/");
}

/* ================= CONVOYS ================= */
async function addConvoy(){

    const c = {
        id: Date.now(),

        title: title.value.trim(),
        start: start.value.trim(),
        end: end.value.trim(),
        time: time.value.trim(),
        date: date.value,

        server: server.value.trim(),
        meeting: meeting.value.trim(),
        meetingTime: meetingTime.value.trim(),
        distance: distance.value.trim(),
        cargo: cargo.value.trim(),
        dlc: dlc.value.trim(),
        description: description.value.trim()
    };

    const res = await fetch("/api/convoys",{credentials:"include"});
    const data = await res.json();
    const safe = Array.isArray(data) ? data : [];

    safe.push(c);
    console.log("📤 CONVOY ENVOYÉ :", c);
    
    await fetch("/api/convoys",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        credentials:"include",
        body:JSON.stringify(safe)
    });

    loadConvoys();
}

/* LOAD CONVOYS */
async function loadConvoys(){

    const res = await fetch("/api/convoys",{credentials:"include"});
    const data = await res.json();

    const el = document.getElementById("convoyList");
    if(!Array.isArray(data)) return;

    el.innerHTML = data.map(c=>`
        <div class="card">
            <h3>${c.title}</h3>
            <p>${c.start} → ${c.end}</p>
            <p>${c.date} - ${c.time}</p>

            <p>🖥️ ${c.server || "-"}</p>
            <p>🚛 ${c.cargo || "-"}</p>
            <p>📏 ${c.distance || "-"} km</p>
            <p>🏁 ${c.meeting || "-"}</p>
            <p>🕒 ${c.meetingTime || "-"}</p>
            <p>🗺️ ${c.dlc || "-"}</p>
            <p>${c.description || ""}</p>

            <button class="btn-danger" onclick="deleteConvoy(${c.id})">
                Supprimer
            </button>
        </div>
    `).join("");
}

/* DELETE CONVOY */
async function deleteConvoy(id){

    const res = await fetch("/api/convoys",{credentials:"include"});
    const data = await res.json();

    const safe = Array.isArray(data) ? data : [];

    const updated = safe.filter(c => c.id !== id);

    await fetch("/api/convoys",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        credentials:"include",
        body:JSON.stringify(updated)
    });

    loadConvoys();
}

    /* LOAD DRIVERS */

async function loadDrivers(){

    const res = await fetch("/api/users",{
        credentials:"include"
    });

    const data = await res.json();

    const el = document.getElementById("driversList");

    if(!Array.isArray(data)) return;


    el.innerHTML = data.map(d=>`

        <div class="card" style="margin-top:20px">

            <h3>🚛 ${d.username}</h3>

            <p>👤 Nom : ${d.name || "-"}</p>

            <p>🎧 Discord : ${d.discord || "-"}</p>

            <p>🚚 Camion : ${d.truck_name || "-"}</p>

            <p>🟢 Statut : ${d.status || "-"}</p>


            <button class="btn-danger" onclick="deleteDriver(${d.id})">
                Supprimer
            </button>

        </div>

    `).join("");

}
    
/* ================= TEAM ================= */
async function addMember(){

    const nameEl = document.getElementById("name");
    const roleEl = document.getElementById("role");
    const file = document.getElementById("avatarFile").files[0];
    const url = document.getElementById("avatarUrl").value.trim();

    let avatar = "";

    if(file){
        avatar = await toBase64(file);
    } else if(url){
        avatar = url;
    }

    const member = {
        id: Date.now(),
        name: nameEl.value.trim(),
        role: roleEl.value.trim(),
        avatar
    };

    const res = await fetch("/api/team",{credentials:"include"});
    const data = await res.json();

    const safe = Array.isArray(data) ? data : [];

    safe.push(member);

    await fetch("/api/team",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        credentials:"include",
        body:JSON.stringify(safe)
    });

    loadTeam();
}

/* LOAD TEAM */
async function loadTeam(){

    const res = await fetch("/api/team",{credentials:"include"});
    const data = await res.json();

    const el = document.getElementById("teamList");

    if(!Array.isArray(data)) return;

    el.innerHTML = data.map(m=>`
        <div class="card">
            <img src="${m.avatar || 'https://via.placeholder.com/100'}"
                 style="width:80px;height:80px;border-radius:50%">

            <h3>${m.name}</h3>
            <p>${m.role}</p>

            <button class="btn-danger" onclick="deleteMember(${m.id})">
                Supprimer
            </button>
        </div>
    `).join("");
}

/* DELETE TEAM */
async function deleteMember(id){

    const res = await fetch("/api/team",{credentials:"include"});
    const data = await res.json();

    const safe = Array.isArray(data) ? data : [];

    const updated = safe.filter(m => m.id !== id);

    await fetch("/api/team",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        credentials:"include",
        body:JSON.stringify(updated)
    });

    loadTeam();
}

/* BASE64 */
function toBase64(file){
    return new Promise((res,rej)=>{
        const r = new FileReader();
        r.onload = ()=>res(r.result);
        r.onerror = rej;
        r.readAsDataURL(file);
    });
}

/* ================= DRIVERS ================= */

async function createDriver(){


const driver = {

username:
document.getElementById("driverUsername").value.trim(),


password:
document.getElementById("driverPassword").value.trim(),


name:
document.getElementById("driverName").value.trim(),


discord:
document.getElementById("driverDiscord").value.trim(),


truck_name:
document.getElementById("driverTruck").value.trim()

};



const res = await fetch("/api/users",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

credentials:"include",

body:JSON.stringify(driver)

});



const data = await res.json();



const msg =
document.getElementById("driverMessage");



if(data.success){

msg.innerHTML =
"✅ Conducteur créé avec succès";


document.getElementById("driverUsername").value="";
document.getElementById("driverPassword").value="";
document.getElementById("driverName").value="";
document.getElementById("driverDiscord").value="";
document.getElementById("driverTruck").value="";


}

else{

msg.innerHTML =
"❌ Erreur création conducteur";

}


}
    
/* INIT */
loadConvoys();
loadTeam();
loadDrivers();
</script>

</body>
</html>
