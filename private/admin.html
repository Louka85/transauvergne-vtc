<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0f0f0f;
    color:white;
}

.header{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:60px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 20px;
    background:rgba(15,15,15,0.9);
    border-bottom:1px solid rgba(255,255,255,0.08);
    box-sizing:border-box;
}

.container{
    padding:100px 20px;
    max-width:1000px;
    margin:auto;
}

.tabs{
    display:flex;
    gap:10px;
    margin-bottom:20px;
}

.tab{
    padding:10px 15px;
    background:#1a1a1a;
    border-radius:8px;
    cursor:pointer;
}

.tab.active{
    background:#2ecc71;
    color:black;
}

.card{
    background:#161616;
    padding:15px;
    border-radius:12px;
    margin-bottom:15px;
}

input, textarea{
    width:100%;
    padding:10px;
    margin:5px 0;
    background:#111;
    border:1px solid rgba(255,255,255,0.08);
    color:white;
    border-radius:8px;
}

button{
    padding:10px 12px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.btn{
    background:#2ecc71;
    color:black;
    font-weight:bold;
}

.btn-danger{
    background:#e74c3c;
    color:white;
}

.grid{
    display:grid;
    grid-template-columns:repeat(2, 1fr);
    gap:15px;
}

@media(max-width:700px){
    .grid{ grid-template-columns:1fr; }
}
</style>
</head>

<body>

<div class="header">
    <b>Admin Panel</b>
    <button class="btn-danger" onclick="logout()">Logout</button>
</div>

<div class="container">

<!-- TABS -->
<div class="tabs">
    <div class="tab active" onclick="show('convoys')">Convois</div>
    <div class="tab" onclick="show('team')">Équipe</div>
</div>

<!-- ================= CONVOYS ================= -->
<div id="convoys">

<div class="card">
<h3>Nouveau convoi</h3>

<input id="title" placeholder="Titre">
<input id="start" placeholder="Départ">
<input id="end" placeholder="Destination">
<input id="time" placeholder="Heure">
<input id="date" type="date">

<input id="server" placeholder="Serveur TMP">
<input id="meeting" placeholder="Rassemblement">
<input id="meetingTime" placeholder="Heure rassemblement">
<input id="distance" placeholder="Distance (km)">
<input id="cargo" placeholder="Fret">
<input id="dlc" placeholder="DLC">
<textarea id="description" placeholder="Description"></textarea>

<button class="btn" onclick="addConvoy()">Ajouter convoi</button>
</div>

<div id="convoyList" class="grid"></div>

</div>

<!-- ================= TEAM ================= -->
<div id="team" style="display:none">

<div class="card">
<h3>Ajouter membre</h3>

<input id="name" placeholder="Nom">
<input id="role" placeholder="Rôle">
<input type="file" id="avatarFile">
<input id="avatarUrl" placeholder="Lien image (optionnel)">

<button class="btn" onclick="addMember()">Ajouter membre</button>
</div>

<div id="teamList" class="grid"></div>

</div>

</div>

<script>

/* NAV */
function show(tab){
    document.getElementById("convoys").style.display = tab==="convoys"?"block":"none";
    document.getElementById("team").style.display = tab==="team"?"block":"none";
}

/* LOGOUT */
function logout(){
    fetch("/logout",{credentials:"include"})
    .then(()=>location.href="/");
}

/* ================= CONVOYS ================= */
async function addConvoy(){

    const c = {
        id: Date.now(),

        title: title.value.trim(),
        start: start.value.trim(),
        end: end.value.trim(),
        time: time.value.trim(),
        date: date.value,

        server: server.value.trim(),
        meeting: meeting.value.trim(),
        meetingTime: meetingTime.value.trim(),
        distance: distance.value.trim(),
        cargo: cargo.value.trim(),
        dlc: dlc.value.trim(),
        description: description.value.trim()
    };

    const res = await fetch("/api/convoys",{credentials:"include"});
    const data = await res.json();
    const safe = Array.isArray(data) ? data : [];

    safe.push(c);
    console.log("📤 CONVOY ENVOYÉ :", c);
    
    await fetch("/api/convoys",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        credentials:"include",
        body:JSON.stringify(safe)
    });

    loadConvoys();
}

/* LOAD CONVOYS */
async function loadConvoys(){

    const res = await fetch("/api/convoys",{credentials:"include"});
    const data = await res.json();

    const el = document.getElementById("convoyList");
    if(!Array.isArray(data)) return;

    el.innerHTML = data.map(c=>`
        <div class="card">
            <h3>${c.title}</h3>
            <p>${c.start} → ${c.end}</p>
            <p>${c.date} - ${c.time}</p>

            <p>🖥️ ${c.server || "-"}</p>
            <p>🚛 ${c.cargo || "-"}</p>
            <p>📏 ${c.distance || "-"} km</p>
            <p>🏁 ${c.meeting || "-"}</p>
            <p>🕒 ${c.meetingTime || "-"}</p>
            <p>🗺️ ${c.dlc || "-"}</p>
            <p>${c.description || ""}</p>

            <button class="btn-danger" onclick="deleteConvoy(${c.id})">
                Supprimer
            </button>
        </div>
    `).join("");
}

/* DELETE CONVOY */
async function deleteConvoy(id){

    const res = await fetch("/api/convoys",{credentials:"include"});
    const data = await res.json();

    const safe = Array.isArray(data) ? data : [];

    const updated = safe.filter(c => c.id !== id);

    await fetch("/api/convoys",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        credentials:"include",
        body:JSON.stringify(updated)
    });

    loadConvoys();
}

/* ================= TEAM ================= */
async function addMember(){

    const file = avatarFile.files[0];
    const url = avatarUrl.value.trim();

    let avatar = "";

    if(file){
        avatar = await toBase64(file);
    } else if(url){
        avatar = url;
    }

    const member = {
        id: Date.now(),
        name: name.value.trim(),
        role: role.value.trim(),
        avatar
    };

    const res = await fetch("/api/team",{credentials:"include"});
    const data = await res.json();

    const safe = Array.isArray(data) ? data : [];

    safe.push(member);

    await fetch("/api/team",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        credentials:"include",
        body:JSON.stringify(safe)
    });

    loadTeam();
}

/* LOAD TEAM */
async function loadTeam(){

    const res = await fetch("/api/team",{credentials:"include"});
    const data = await res.json();

    const el = document.getElementById("teamList");

    if(!Array.isArray(data)) return;

    el.innerHTML = data.map(m=>`
        <div class="card">
            <img src="${m.avatar || 'https://via.placeholder.com/100'}"
                 style="width:80px;height:80px;border-radius:50%">

            <h3>${m.name}</h3>
            <p>${m.role}</p>

            <button class="btn-danger" onclick="deleteMember(${m.id})">
                Supprimer
            </button>
        </div>
    `).join("");
}

/* DELETE TEAM */
async function deleteMember(id){

    const res = await fetch("/api/team",{credentials:"include"});
    const data = await res.json();

    const safe = Array.isArray(data) ? data : [];

    const updated = safe.filter(m => m.id !== id);

    await fetch("/api/team",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        credentials:"include",
        body:JSON.stringify(updated)
    });

    loadTeam();
}

/* BASE64 */
function toBase64(file){
    return new Promise((res,rej)=>{
        const r = new FileReader();
        r.onload = ()=>res(r.result);
        r.onerror = rej;
        r.readAsDataURL(file);
    });
}

/* INIT */
loadConvoys();
loadTeam();

</script>

</body>
</html>
