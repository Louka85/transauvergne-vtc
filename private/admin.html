<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at top, #151515, #0f0f0f);
  color: white;
}

/* =========================
   HEADER
========================= */

.header {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 64px;

  display: flex;
  justify-content: space-between;
  align-items: center;

  padding: 0 22px;

  background: rgba(20, 20, 20, 0.85);
  backdrop-filter: blur(14px);

  border-bottom: 1px solid rgba(255,255,255,0.06);

  z-index: 1000;
}

.header b {
  font-size: 16px;
}

/* =========================
   CONTAINER
========================= */

.container {
  padding: 110px 20px 50px;
  max-width: 1100px;
  margin: auto;
}

/* =========================
   TABS
========================= */

.tabs {
  display: flex;
  gap: 12px;
  margin-bottom: 22px;
}

.tab {
  padding: 10px 16px;

  border-radius: 12px;

  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);

  cursor: pointer;

  color: rgba(255,255,255,0.7);

  transition: 0.2s ease;
}

.tab:hover {
  transform: translateY(-2px);
  color: white;
}

.tab.active {
  background: linear-gradient(135deg, #2ecc71, #27ae60);
  color: #0f0f0f;
  font-weight: bold;
}

/* =========================
   CARDS
========================= */

.card {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);

  padding: 18px;
  border-radius: 16px;

  margin-bottom: 15px;

  transition: 0.25s ease;
}

.card:hover {
  transform: translateY(-4px);
  border-color: rgba(46,204,113,0.35);
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

/* =========================
   INPUTS
========================= */

input {
  width: 100%;
  padding: 11px;
  margin: 6px 0;

  border-radius: 10px;

  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.08);

  color: white;
  outline: none;
}

input:focus {
  border-color: #2ecc71;
  background: rgba(255,255,255,0.08);
}

/* =========================
   BUTTONS
========================= */

button {
  padding: 10px 14px;
  border: none;
  border-radius: 10px;

  cursor: pointer;

  transition: 0.2s ease;
  font-weight: bold;
}

.btn {
  background: #2ecc71;
  color: #0f0f0f;
}

.btn:hover {
  transform: translateY(-2px);
}

.btn-danger {
  background: #e74c3c;
  color: white;
}

.btn-danger:hover {
  transform: translateY(-2px);
}

/* =========================
   GRID
========================= */

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 14px;
}

/* =========================
   TEAM IMAGE
========================= */

.card img {
  border-radius: 50%;
}

/* =========================
   RESPONSIVE
========================= */

@media (max-width: 768px) {
  .tabs {
    flex-direction: column;
  }
}
</style>
</head>

<body>

<div class="header">
  <b>Admin Panel</b>
  <button onclick="logout()" class="btn-danger">Logout</button>
</div>

<div class="container">

<div class="tabs">
  <div class="tab active" onclick="show('convoys')">Convois</div>
  <div class="tab" onclick="show('team')">Équipe</div>
</div>

<!-- ===================== CONVOIS ===================== -->
<div id="convoys">

  <div class="card">
    <h3>Nouveau convoi</h3>

    <input id="title" placeholder="Titre">
    <input id="start" placeholder="Départ">
    <input id="end" placeholder="Destination">
    <input id="time" placeholder="Heure">
    <input id="date" type="date">

    <button class="btn" onclick="addConvoy()">Ajouter</button>
  </div>

  <div id="convoyList" class="grid"></div>
</div>

<!-- ===================== TEAM ===================== -->
<div id="team" style="display:none">

  <div class="card">
    <h3>Ajouter membre</h3>

    <input id="name" placeholder="Nom">
    <input id="role" placeholder="Rôle">

    <button class="btn" onclick="addMember()">Ajouter</button>
  </div>

  <div id="teamList" class="grid"></div>
</div>

</div>

<script>
function show(tab){
  document.getElementById("convoys").style.display = tab==="convoys"?"block":"none";
  document.getElementById("team").style.display = tab==="team"?"block":"none";
}
</script>

</body>
</html>
