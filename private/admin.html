<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0f0f0f;
  color:white;
}

.header {
  display:flex;
  justify-content:space-between;
  padding:15px;
  background:#111;
  position:fixed;
  width:100%;
  top:0;
}

.container {
  padding:100px 20px;
  max-width:1000px;
  margin:auto;
}

.tabs {
  display:flex;
  gap:10px;
  margin-bottom:20px;
}

.tab {
  padding:10px 15px;
  background:#222;
  cursor:pointer;
  border-radius:8px;
}

.tab.active {
  background:#5865F2;
}

.card {
  background:#1a1a1a;
  padding:15px;
  border-radius:10px;
  margin-bottom:15px;
}

input {
  width:100%;
  padding:10px;
  margin:5px 0;
  background:#111;
  border:none;
  color:white;
}

button {
  padding:10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.btn { background:#5865F2; color:white; }
.btn-danger { background:#e74c3c; color:white; }
</style>
</head>

<body>

<div class="header">
  <b>Admin Panel</b>
  <button onclick="logout()" class="btn-danger">Logout</button>
</div>

<div class="container">

<div class="tabs">
  <div class="tab active" onclick="show('convoys')">Convois</div>
  <div class="tab" onclick="show('team')">Équipe</div>
</div>

<!-- CONVOIS -->
<div id="convoys">

  <div class="card">
    <h3>Nouveau convoi</h3>
    <input id="title" placeholder="Titre">
    <input id="start" placeholder="Départ">
    <input id="end" placeholder="Destination">
    <input id="time" placeholder="Heure">
    <input id="date" type="date">
    <button class="btn" onclick="addConvoy()">Ajouter</button>
  </div>

  <div id="convoyList"></div>
</div>

<!-- TEAM -->
<div id="team" style="display:none">

  <div class="card">
    <h3>Ajouter membre</h3>
    <input id="name" placeholder="Nom">
    <input id="role" placeholder="Rôle">
    <button class="btn" onclick="addMember()">Ajouter</button>
  </div>

  <div id="teamList"></div>
</div>

</div>

<script>

let convoys = [];
let team = [];

function show(tab){
  document.getElementById("convoys").style.display = tab==="convoys"?"block":"none";
  document.getElementById("team").style.display = tab==="team"?"block":"none";
}

/* LOAD */
async function load(){
  convoys = await fetch("/api/convoys").then(r=>r.json());
  team = await fetch("/api/team").then(r=>r.json());
  render();
}

function render(){

  document.getElementById("convoyList").innerHTML =
    convoys.map((c,i)=>`
      <div class="card">
        <b>${c.title}</b><br>
        ${c.start} → ${c.end}<br>
        <button class="btn-danger" onclick="delConvoy(${i})">Supprimer</button>
      </div>
    `).join("");

  document.getElementById("teamList").innerHTML =
    team.map((m,i)=>`
      <div class="card">
        <b>${m.name}</b> - ${m.role}<br>
        <button class="btn-danger" onclick="delMember(${i})">Supprimer</button>
      </div>
    `).join("");
}

/* CONVOY */
function addConvoy(){
  convoys.push({
    title:title.value,
    start:start.value,
    end:end.value,
    time:time.value,
    date:date.value
  });
  saveConvoys();
}

function delConvoy(i){
  convoys.splice(i,1);
  saveConvoys();
}

function saveConvoys(){
  fetch("/api/convoys", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify(convoys)
  }).then(load);
}

/* TEAM */
function addMember(){
  team.push({name:name.value, role:role.value});
  saveTeam();
}

function delMember(i){
  team.splice(i,1);
  saveTeam();
}

function saveTeam(){
  fetch("/api/team", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify(team)
  }).then(load);
}

/* LOGOUT */
function logout(){
  fetch("/logout").then(()=>location.href="/");
}

load();

</script>

</body>
</html>
