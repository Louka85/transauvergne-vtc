<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0f0f0f;
    color:white;
}

/* HEADER */
.header{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:60px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 20px;
    background:rgba(15,15,15,0.9);
    border-bottom:1px solid rgba(255,255,255,0.08);
    box-sizing:border-box;
}

/* CONTAINER */
.container{
    padding:100px 20px;
    max-width:1000px;
    margin:auto;
}

/* TABS */
.tabs{
    display:flex;
    gap:10px;
    margin-bottom:20px;
}

.tab{
    padding:10px 15px;
    background:#1a1a1a;
    border-radius:8px;
    cursor:pointer;
    transition:0.2s;
}

.tab.active{
    background:#2ecc71;
    color:#000;
}

/* CARDS */
.card{
    background:#161616;
    padding:15px;
    border-radius:12px;
    margin-bottom:15px;
    border:1px solid rgba(255,255,255,0.05);
}

/* INPUT */
input{
    width:100%;
    padding:10px;
    margin:5px 0;
    background:#111;
    border:1px solid rgba(255,255,255,0.08);
    color:white;
    border-radius:8px;
    outline:none;
}

/* BUTTONS */
button{
    padding:10px 12px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.btn{
    background:#2ecc71;
    color:#000;
    font-weight:bold;
}

.btn-danger{
    background:#e74c3c;
    color:white;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(2, 1fr);
    gap:15px;
}

@media(max-width:700px){
    .grid{
        grid-template-columns:1fr;
    }
}
</style>
</head>

<body>

<div class="header">
    <b>Admin Panel</b>
    <button class="btn-danger" onclick="logout()">Logout</button>
</div>

<div class="container">

    <div class="tabs">
        <div class="tab active" onclick="show('convoys')">Convois</div>
        <div class="tab" onclick="show('team')">Équipe</div>
    </div>

    <!-- CONVOYS -->
    <div id="convoys">

        <div class="card">
            <h3>Nouveau convoi</h3>

            <input id="title" placeholder="Titre">
            <input id="start" placeholder="Départ">
            <input id="end" placeholder="Destination">
            <input id="time" placeholder="Heure">
            <input id="date" type="date">

            <button class="btn" onclick="addConvoy()">Ajouter</button>
        </div>

        <div id="convoyList" class="grid"></div>
    </div>

    <!-- TEAM -->
    <div id="team" style="display:none">

        <div class="card">
            <h3>Ajouter membre</h3>

            <input id="name" placeholder="Nom">
            <input id="role" placeholder="Rôle">

            <button class="btn" onclick="addMember()">Ajouter</button>
        </div>

        <div id="teamList" class="grid"></div>
    </div>

</div>

<script>

/* NAV */
function show(tab){
    document.getElementById("convoys").style.display = tab==="convoys"?"block":"none";
    document.getElementById("team").style.display = tab==="team"?"block":"none";
}

/* LOGOUT */
function logout(){
    fetch("/logout",{credentials:"include"})
    .then(()=>location.href="/");
}

/* CONVOY */
async function addConvoy(){

    const c = {
        title: document.getElementById("title").value.trim(),
        start: document.getElementById("start").value.trim(),
        end: document.getElementById("end").value.trim(),
        time: document.getElementById("time").value.trim(),
        date: document.getElementById("date").value
    };

    if(!c.title || !c.start || !c.end){
        alert("Remplis les champs");
        return;
    }

    const convoys = await fetch("/api/convoys", {
        credentials:"include"
    }).then(r => r.json());

    const safe = Array.isArray(convoys) ? convoys : [];

    safe.push(c);

    await fetch("/api/convoys", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        credentials:"include",
        body: JSON.stringify(safe)
    });

    location.reload();
}

/* DELETE SAFE (placeholder simple) */
async function addMember(){

  const name = document.getElementById("name").value.trim();
  const role = document.getElementById("role").value.trim();

  if(!name || !role){
    alert("Nom + rôle requis");
    return;
  }

  const res = await fetch("/api/team", { credentials:"include" });
  const team = await res.json();

  const safe = Array.isArray(team) ? team : [];

  safe.push({
    name,
    role,
    avatar: null
  });

  await fetch("/api/team", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    credentials:"include",
    body: JSON.stringify(safe)
  });

  location.reload();
}

</script>

</body>
</html>
