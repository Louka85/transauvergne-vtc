<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0f0f0f;
  color:white;
}

header {
  padding:15px;
  background:#111;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

button {
  padding:10px;
  border:none;
  cursor:pointer;
  background:#5865F2;
  color:white;
  border-radius:8px;
}

.container {
  display:flex;
  height:calc(100vh - 60px);
}

.menu {
  width:220px;
  background:#151515;
  padding:10px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.menu button {
  background:#222;
}

.menu button:hover {
  background:#333;
}

.content {
  flex:1;
  padding:20px;
  overflow:auto;
}

.card {
  background:#1a1a1a;
  padding:15px;
  border-radius:10px;
  margin-bottom:10px;
}

input {
  width:100%;
  margin:5px 0;
  padding:8px;
  background:#222;
  border:none;
  color:white;
  border-radius:6px;
}
</style>
</head>

<body>

<header>
  <h3>Admin Panel</h3>
  <button onclick="logout()">Logout</button>
</header>

<div class="container">

  <div class="menu">
    <button onclick="load('convoys')">🚛 Convois</button>
    <button onclick="load('team')">👥 Équipe</button>
  </div>

  <div class="content" id="content">
    Chargement...
  </div>

</div>

<script>

let data = {convoys:[], team:[]};

async function load(type) {
  const res = await fetch("/api/admin/dashboard");
  data = await res.json();

  const c = document.getElementById("content");
  c.innerHTML = "";

  if (type === "convoys") {
    c.innerHTML = `<h2>Convois</h2>`;

    data.convoys.forEach((v, i) => {
      c.innerHTML += `
        <div class="card">
          <input value="${v.title}" onchange="editConvoy(${i},'title',this.value)">
          <input value="${v.start}" onchange="editConvoy(${i},'start',this.value)">
          <input value="${v.end}" onchange="editConvoy(${i},'end',this.value)">
          <input value="${v.date}" onchange="editConvoy(${i},'date',this.value)">
        </div>
      `;
    });

    c.innerHTML += `<button onclick="saveConvoys()">💾 Sauvegarder</button>`;
  }

  if (type === "team") {
    c.innerHTML = `<h2>Équipe</h2>`;

    data.team.forEach((v, i) => {
      c.innerHTML += `
        <div class="card">
          <input value="${v.name}" onchange="editTeam(${i},'name',this.value)">
          <input value="${v.role}" onchange="editTeam(${i},'role',this.value)">
        </div>
      `;
    });

    c.innerHTML += `<button onclick="saveTeam()">💾 Sauvegarder</button>`;
  }
}

function editConvoy(i, key, value){
  data.convoys[i][key] = value;
}

function editTeam(i, key, value){
  data.team[i][key] = value;
}

async function saveConvoys(){
  await fetch("/api/convoys", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify(data.convoys)
  });

  alert("Convois sauvegardés");
}

async function saveTeam(){
  await fetch("/api/team", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify(data.team)
  });

  alert("Équipe sauvegardée");
}

function logout(){
  fetch("/logout").then(()=>location.href="/");
}

load("convoys");

</script>

</body>
</html>
