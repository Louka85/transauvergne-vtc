<script>
async function loadTeam(){
  try {
    const res = await fetch("/api/team");
    const data = await res.json();

    console.log("RAW TEAM API =", data);

    document.body.innerHTML += "<pre>" + JSON.stringify(data, null, 2) + "</pre>";

  } catch (e) {
    console.log("ERROR API:", e);
  }
}

loadTeam();
