<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Qui sommes-nous - TransAuvergne VTC</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f0f0f;
    color: white;
}

/* HEADER */
.header {
    position: fixed;
    top: 0;
    width: 100%;
    padding: 14px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(10,10,10,0.75);
    backdrop-filter: blur(10px);
    z-index: 1000;
    box-sizing: border-box;
}

/* LOGO */
.logo {
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
    color: white;
    font-weight: bold;
}

.logo img {
    height: 38px;
    border-radius: 6px;
}

/* NAV DESKTOP */
.nav {
    display: flex;
    gap: 15px;
}

.nav a {
    color: #bdbdbd;
    text-decoration: none;
    font-size: 14px;
}

.nav a:hover {
    color: white;
}

/* BURGER */
.mobile-btn {
    display: none;
    font-size: 28px;
    cursor: pointer;
}

/* MOBILE MENU */
.mobile-menu {
    display: none;
    flex-direction: column;
    position: fixed;
    top: 65px;
    right: 15px;
    background: rgba(15,15,15,0.95);
    padding: 15px;
    border-radius: 12px;
    width: 200px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

.mobile-menu a {
    color: white;
    text-decoration: none;
    padding: 10px;
    border-radius: 8px;
}

.mobile-menu a:hover {
    background: rgba(255,255,255,0.08);
}

/* PAGE */
.container {
    padding: 120px 20px;
    text-align: center;
}

.team-grid {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 15px;
    margin-top: 20px;
}

.card {
    background: #1a1a1a;
    padding: 15px;
    border-radius: 12px;
    width: 180px;
    transition: 0.2s;
}

.card:hover {
    transform: translateY(-5px);
}

.card img {
    width: 100%;
    border-radius: 10px;
    margin-bottom: 10px;
}

/* RESPONSIVE */
@media (max-width: 768px) {
    .nav {
        display: none;
    }

    .mobile-btn {
        display: block;
    }
}
</style>
</head>

<body>

<header class="header">

    <a href="index.html" class="logo">
        <img src="logo.jpeg" alt="logo">
        <span>TransAuvergne VTC</span>
    </a>

    <nav class="nav">
        <a href="index.html">Accueil</a>
        <a href="about.html">Qui sommes-nous</a>
        <a href="convoy.html">Convois</a>
        <a href="contact.html">Contact</a>
    </nav>

    <div class="mobile-btn" onclick="toggleMenu()">☰</div>

</header>

<!-- MOBILE MENU -->
<div id="mobileMenu" class="mobile-menu">
    <a href="index.html" onclick="toggleMenu()">Accueil</a>
    <a href="about.html" onclick="toggleMenu()">Qui sommes-nous</a>
    <a href="convoy.html" onclick="toggleMenu()">Convois</a>
    <a href="contact.html" onclick="toggleMenu()">Contact</a>
</div>

<!-- CONTENT -->
<div class="container">

    <h1>Qui sommes-nous</h1>
    <p>TransAuvergne VTC est une organisation virtuelle active sur TruckersMP.</p>

    <div class="team-grid" id="team"></div>

</div>

<script>
function toggleMenu() {
    const menu = document.getElementById("mobileMenu");
    menu.style.display = (menu.style.display === "flex") ? "none" : "flex";
}

async function loadTeam() {
    try {
        const res = await fetch("/api/team");
        const data = await res.json();

        document.getElementById("team").innerHTML = data.map(m => `
            <div class="card">
                <img src="${m.avatar || 'https://via.placeholder.com/150'}">
                <h3>${m.name}</h3>
                <p>${m.role}</p>
            </div>
        `).join("");

    } catch (err) {
        console.error(err);
    }
}

loadTeam();
</script>

</body>
</html>
