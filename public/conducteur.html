<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Espace Conducteur - TransAuvergne VTC</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<header class="header">

<a href="index.html" class="logo">
    <img src="logo.jpeg">
    <span>TransAuvergne VTC</span>
</a>


<div class="status">

<span class="dot"></span>
Espace Conducteur

</div>


<button class="logout" onclick="logout()">
🚪 Déconnexion
</button>


</header>

<main class="driver-page">


<div class="driver-card">

<h1>
🚛 Espace Conducteur
</h1>


<p>
Bienvenue dans ton espace personnel TransAuvergne VTC.
Ici tu retrouveras toutes les informations liées à ton activité.
</p>


</div>




<div class="driver-card">


<h2>
📂 Catégories
</h2>


<select id="category" onchange="openCategory()">

<option value="">
Choisir une catégorie
</option>


<option value="profil">
👤 Mon profil
</option>


<option value="convoys">
🚛 Mes convois
</option>


<option value="stats">
📊 Mes statistiques
</option>


<option value="planning">
📅 Planning
</option>


<option value="rules">
📜 Règlement conducteur
</option>


</select>


</div>





<div id="content">


<div class="driver-card">

<h2>
Bienvenue conducteur 👋
</h2>


<p>
Sélectionne une catégorie pour afficher les informations.
</p>


</div>


</div>




</main>





<script>

function logout(){

fetch("/logout",
{
credentials:"include"
})
.then(()=>{

location.href="/";

});

}




function openCategory(){


let value=document.getElementById("category").value;


let content=document.getElementById("content");



let pages={


profil:`

<div class="driver-card">

<h2>👤 Profil conducteur</h2>

<p>
<strong>Nom :</strong> Conducteur<br>
<strong>Grade :</strong> Conducteur VTC<br>
<strong>Statut :</strong> 🟢 Actif<br>
<strong>Date d'arrivée :</strong> Non renseignée
</p>

<hr>

<h3>🚛 Informations transport</h3>

<p>
Camion principal : Non renseigné<br>
Kilomètres parcourus : 0 km<br>
Convois effectués : 0
</p>

</div>

`,



convoys:`

<div class="driver-card">

<h2>🚛 Mes convois</h2>

<div class="card">

<h3>🏁 Aucun convoi enregistré</h3>

<p>
Tes prochains convois apparaîtront ici.
</p>

</div>


</div>

`,



stats:`

<div class="driver-card">

<h2>📊 Mes statistiques</h2>


<div class="card">

<p>
🚛 Convois réalisés : 0
</p>

<p>
🛣️ Distance parcourue : 0 km
</p>

<p>
⭐ Participation : 0%
</p>

<p>
🏆 Réputation conducteur : Nouveau
</p>

</div>


</div>

`,



planning:`

<div class="driver-card">

<h2>📅 Planning</h2>


<div class="card">

<h3>Prochain événement</h3>

<p>
Aucun événement prévu actuellement.
</p>

</div>


<div class="card">

<h3>Rappels</h3>

<p>
Pense à consulter régulièrement les annonces de la VTC.
</p>

</div>


</div>

`,



rules:`

<div class="rules-card">

<h2>📜 Règlement conducteur</h2>


<p>
Bienvenue chez TransAuvergne VTC.
Chaque conducteur représente la communauté lors des convois.
</p>


<h3>🚛 Comportement général</h3>

<p>
• Respect des autres conducteurs.<br>
• Bonne attitude sur Discord et en jeu.<br>
• Aucun comportement perturbateur.<br>
• Respect des décisions du staff.
</p>


<h3>🛣️ Pendant les convois</h3>

<p>
• Être présent à l'heure.<br>
• Respecter les organisateurs.<br>
• Garder une distance de sécurité.<br>
• Éviter les dépassements dangereux.
</p>


<h3>🎧 Discord</h3>

<p>
• Micro correctement réglé.<br>
• Respect des salons.<br>
• Bonne ambiance obligatoire.
</p>


<h3>⚠️ Sanctions</h3>

<p>
Les sanctions peuvent aller du rappel à l'ordre
jusqu'à l'exclusion de la VTC selon la gravité.
</p>


<h3>🏁 Objectif</h3>

<p>
Créer une communauté sérieuse, organisée et agréable
pour tous les passionnés du transport virtuel.
</p>


<p style="color:#2ecc71;font-weight:bold;">
— Direction TransAuvergne VTC 🚛
</p>


</div>

`

};



content.innerHTML =
pages[value] || "";

}



</script>


</body>

</html>
