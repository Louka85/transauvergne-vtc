<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Espace Conducteur - TransAuvergne VTC</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<header class="header">

<a href="index.html" class="logo">
    <img src="logo.jpeg">
    <span>TransAuvergne VTC</span>
</a>


<div class="status">

<span class="dot"></span>
Espace Conducteur

</div>


<button class="logout" onclick="logout()">
🚪 Déconnexion
</button>


</header>

<main class="driver-page">


<div class="driver-card">

<h1>
🚛 Espace Conducteur
</h1>


<p>
Bienvenue dans ton espace personnel TransAuvergne VTC.
Ici tu retrouveras toutes les informations liées à ton activité.
</p>


</div>




<div class="driver-card">


<h2>
📂 Catégories
</h2>


<select id="category" onchange="openCategory()">

<option value="">
Choisir une catégorie
</option>


<option value="profil">
👤 Mon profil
</option>


<option value="convoys">
🚛 Mes convois
</option>


<option value="stats">
📊 Mes statistiques
</option>


<option value="planning">
📅 Planning
</option>


<option value="rules">
📜 Règlement conducteur
</option>


</select>


</div>





<div id="content">


<div class="driver-card">

<h2>
Bienvenue conducteur 👋
</h2>


<p>
Sélectionne une catégorie pour afficher les informations.
</p>


</div>


</div>




</main>





<script>

function logout(){

fetch("/logout",
{
credentials:"include"
})
.then(()=>{
location.href="/";
});

}



function openCategory(){

let value=document.getElementById("category").value;

let content=document.getElementById("content");


let pages={


convoys:`

<div class="driver-card">

<h2>🚛 Mes convois</h2>

<div id="driverConvoyList">

Chargement des convois...

</div>

</div>

`


};


content.innerHTML = pages[value] || "";


// Lancer le chargement après avoir créé la div
if(value === "convoys"){
    loadDriverConvoys();
}


}




function loadDriverConvoys(){


fetch("/api/convoys", {
    credentials:"include"
})

.then(r => r.json())

.then(data => {


const el = document.getElementById("driverConvoyList");


if(!data || data.length === 0){

el.innerHTML = "Aucun convoi disponible.";

return;

}


el.innerHTML = "";


data.forEach(c => {


el.innerHTML += `

<div class="card">


<h3>${c.title ?? "Sans titre"}</h3>


<p>
📍 ${c.start ?? "?"} → ${c.end ?? "?"}
</p>


<p>
📅 ${c.date ?? "?"}
</p>


<p>
⏰ ${c.time ?? "?"}
</p>


<p>
🚛 Fret : ${c.cargo ?? "Non défini"}
</p>


<p>
🖥️ Serveur : ${c.server ?? "Non défini"}
</p>


</div>


`;


});


})


.catch(err=>{

console.error("Erreur convois conducteur :",err);

document.getElementById("driverConvoyList").innerHTML =
"Erreur de chargement.";

});


}



</script>


</body>

</html>
