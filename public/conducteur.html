<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Espace Conducteur - TransAuvergne VTC</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<header class="header">

<a href="index.html" class="logo">
    <img src="logo.jpeg">
    <span>TransAuvergne VTC</span>
</a>


<div class="status">

<span class="dot"></span>
Espace Conducteur

</div>


<button class="logout" onclick="logout()">
🚪 Déconnexion
</button>


</header>

<main class="driver-page">


<div class="driver-card">

<h1>
🚛 Espace Conducteur
</h1>


<p>
Bienvenue dans ton espace personnel TransAuvergne VTC.
Ici tu retrouveras toutes les informations liées à ton activité.
</p>


</div>




<div class="driver-card">


<h2>
📂 Catégories
</h2>


<select id="category" onchange="openCategory()">

<option value="">
Choisir une catégorie
</option>


<option value="profil">
👤 Mon profil
</option>


<option value="convoys">
🚛 Mes convois
</option>


<option value="stats">
📊 Mes statistiques
</option>


<option value="planning">
📅 Planning
</option>


<option value="rules">
📜 Règlement conducteur
</option>


</select>


</div>





<div id="content">


<div class="driver-card">

<h2>
Bienvenue conducteur 👋
</h2>


<p>
Sélectionne une catégorie pour afficher les informations.
</p>


</div>


</div>




</main>





<script>

function logout(){

fetch("/logout",
{
credentials:"include"
})
.then(()=>{

location.href="/";

});

}




function openCategory(){


let value=document.getElementById("category").value;


let content=document.getElementById("content");



let pages={


profil:`

<div class="driver-card">

<h2>👤 Profil conducteur</h2>

<p>
Informations personnelles du conducteur.
</p>

</div>

`,



convoys:`

<div class="driver-card">

<h2>🚛 Mes convois</h2>

<p>
Aucun convoi disponible.
</p>

</div>

`,



stats:`

<div class="driver-card">

<h2>📊 Statistiques</h2>

<p>
Les statistiques seront disponibles prochainement.
</p>

</div>

`,



planning:`

<div class="driver-card">

<h2>📅 Planning</h2>

<p>
Aucun événement prévu.
</p>

</div>

`,



rules:`

<div class="driver-card">

<h2>📜 Règlement conducteur</h2>


<p>
Bienvenue chez TransAuvergne VTC.  
En tant que conducteur, tu représentes la communauté lors de chaque convoi.
</p>


<h3>🚛 Comportement général</h3>

<p>
• Respecter les autres membres de la communauté.<br>
• Garder une bonne ambiance sur Discord et en jeu.<br>
• Éviter les provocations, insultes ou comportements gênants.<br>
• Respecter les décisions du staff pendant les événements.
</p>



<h3>🛣️ Pendant les convois</h3>

<p>
• Être présent à l'heure du rendez-vous.<br>
• Respecter l'ordre du convoi et les consignes des organisateurs.<br>
• Garder une distance de sécurité avec les autres camions.<br>
• Éviter les dépassements dangereux.<br>
• Respecter le code de la route autant que possible.
</p>



<h3>🎧 Discord</h3>

<p>
• Utiliser un micro correctement réglé.<br>
• Éviter les bruits parasites pendant les convois.<br>
• Respecter les salons et les règles du serveur Discord.
</p>



<h3>⚠️ Sanctions</h3>

<p>
En cas de non-respect du règlement, plusieurs mesures peuvent être prises :
<br><br>

• Rappel à l'ordre.<br>
• Avertissement conducteur.<br>
• Suspension temporaire des convois.<br>
• Exclusion de la VTC dans les cas graves.
</p>



<h3>🏁 Notre objectif</h3>

<p>
Le but est simple : organiser des convois propres, garder une bonne ambiance et partager notre passion du transport virtuel.
</p>


<p style="color:#2ecc71;font-weight:bold;">
— Direction TransAuvergne VTC 🚛
</p>


</div>

`,

};



content.innerHTML =
pages[value] || "";

}



</script>


</body>

</html>
