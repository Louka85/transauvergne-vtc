<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact - TransAuvergne VTC</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f0f0f;
    color: white;
}

/* HEADER */
.header {
    position: fixed;
    top: 0;
    width: 100%;
    padding: 14px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(10,10,10,0.75);
    backdrop-filter: blur(10px);
    z-index: 1000;
    box-sizing: border-box;
}

/* LOGO */
.logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: bold;
    text-decoration: none;
    color: white;
}

.logo img {
    width: 34px;
    height: 34px;
    border-radius: 6px;
}

/* NAV */
.nav {
    display: flex;
    gap: 15px;
}

.nav a {
    color: #bdbdbd;
    text-decoration: none;
    font-size: 14px;
}

.nav a:hover {
    color: white;
}

/* BURGER */
.mobile-btn {
    display: none;
    font-size: 28px;
    cursor: pointer;
}

/* MOBILE MENU */
.mobile-menu {
    display: none;
    flex-direction: column;
    position: fixed;
    top: 65px;
    right: 15px;
    background: rgba(15,15,15,0.95);
    padding: 15px;
    border-radius: 12px;
    width: 200px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

.mobile-menu a {
    color: white;
    text-decoration: none;
    padding: 10px;
    border-radius: 8px;
}

.mobile-menu a:hover {
    background: rgba(255,255,255,0.08);
}

/* CONTACT */
.contact {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 40px;
    box-sizing: border-box;
}

.contact-box {
    width: 100%;
    max-width: 600px;
    background: rgba(255,255,255,0.05);
    padding: 30px;
    border-radius: 12px;
    backdrop-filter: blur(8px);
}

.contact-box h1 {
    text-align: center;
    margin-bottom: 20px;
}

form {
    display: flex;
    flex-direction: column;
    gap: 15px;
}

input, textarea {
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: rgba(255,255,255,0.08);
    color: white;
    outline: none;
}

textarea {
    height: 120px;
    resize: none;
}

button {
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: #5865F2;
    color: white;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    background: #4752C4;
    transform: scale(1.02);
}

.info {
    margin-top: 15px;
    font-size: 13px;
    color: #aaa;
    text-align: center;
}

/* RESPONSIVE */
@media (max-width: 768px) {
    .nav {
        display: none;
    }

    .mobile-btn {
        display: block;
    }
}
</style>
</head>

<body>

<header class="header">

    <a href="index.html" class="logo">
        <img src="logo.jpeg" alt="logo">
        <span>TransAuvergne VTC</span>
    </a>

    <nav class="nav">
        <a href="index.html">Accueil</a>
        <a href="about.html">Qui sommes-nous</a>
        <a href="convoy.html">Convois</a>
        <a href="contact.html">Contact</a>
    </nav>

    <div class="mobile-btn" onclick="toggleMenu()">☰</div>

</header>

<!-- MOBILE MENU -->
<div id="mobileMenu" class="mobile-menu">
    <a href="index.html" onclick="toggleMenu()">Accueil</a>
    <a href="about.html" onclick="toggleMenu()">Qui sommes-nous</a>
    <a href="convoy.html" onclick="toggleMenu()">Convois</a>
    <a href="contact.html" onclick="toggleMenu()">Contact</a>
</div>

<!-- CONTACT -->
<section class="contact">

    <div class="contact-box">

        <h1>Contact</h1>

        <form>
            <input type="text" placeholder="Ton nom">
            <input type="email" placeholder="Ton email">
            <textarea placeholder="Ton message"></textarea>
            <button type="submit">Envoyer</button>
        </form>

        <div class="info">
            Réponse via Discord : discord.gg/tA7fWf3BPH
        </div>

    </div>

</section>

<script>
function toggleMenu() {
    const menu = document.getElementById("mobileMenu");
    menu.style.display = (menu.style.display === "flex") ? "none" : "flex";
}
</script>

</body>
</html>
