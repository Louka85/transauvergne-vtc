<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact - TransAuvergne VTC</title>

<style>
html {
    scroll-behavior: smooth;
}

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f0f0f;
    color: white;
    overflow-x: hidden;
}

/* HEADER */
.header {
    position: fixed;
    top: 0;
    width: 100%;
    padding: 14px 30px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(10,10,10,0.7);
    backdrop-filter: blur(10px);
    z-index: 1000;
    box-sizing: border-box;
}

/* LOGO GLOBAL */
.logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: bold;
    font-size: 15px;
}

.logo img {
    width: 32px;
    height: 32px;
    object-fit: cover;
    border-radius: 6px;
}

/* NAV */
.nav a {
    color: #bdbdbd;
    margin: 0 12px;
    text-decoration: none;
    font-size: 14px;
}

.nav a:hover {
    color: white;
}

/* STATUS */
.status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    white-space: nowrap;
}

.dot {
    width: 8px;
    height: 8px;
    background: #2ecc71;
    border-radius: 50%;
    box-shadow: 0 0 10px #2ecc71;
}

/* CONTACT */
.contact {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 40px;
    box-sizing: border-box;
}

.contact-box {
    width: 100%;
    max-width: 600px;
    background: rgba(255,255,255,0.05);
    padding: 30px;
    border-radius: 12px;
    backdrop-filter: blur(8px);
}

.contact-box h1 {
    text-align: center;
    margin-bottom: 20px;
}

form {
    display: flex;
    flex-direction: column;
    gap: 15px;
}

input, textarea {
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: rgba(255,255,255,0.08);
    color: white;
    outline: none;
    font-size: 14px;
}

textarea {
    resize: none;
    height: 120px;
}

button {
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: #5865F2;
    color: white;
    font-size: 15px;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    background: #4752C4;
    transform: scale(1.02);
}

.info {
    margin-top: 15px;
    font-size: 13px;
    color: #aaa;
    text-align: center;
}

/* =========================
   RESPONSIVE MOBILE
========================= */

@media (max-width: 768px) {

    .header {
        flex-direction: column;
        align-items: flex-start;
        gap: 10px;
        padding: 12px 15px;
    }

    .nav {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
    }

    .nav a {
        font-size: 13px;
        margin: 0;
    }

    .logo {
        font-size: 14px;
    }

    .status {
        font-size: 12px;
    }

    /* TITRES */
    h1 {
        font-size: 28px !important;
    }

    /* ABOUT / TEXT */
    .about {
        padding: 100px 20px 40px;
    }

    .about p {
        font-size: 15px;
    }

    /* TEAM GRID */
    .team-grid {
        gap: 12px;
    }

    .card {
        width: 100%;
        max-width: 240px;
    }

    /* CONTACT */
    .contact {
        padding: 100px 15px 40px;
    }

    .contact-box {
        padding: 20px;
    }

    input, textarea {
        font-size: 14px;
    }

    button {
        font-size: 14px;
    }
}

</style>
</head>

<body>

<!-- HEADER -->
<header class="header">

    <div class="logo">
        <img src="logo.jpeg" alt="logo">
        <span>TransAuvergne VTC</span>
    </div>

    <nav class="nav">
        <a href="index.html">Accueil</a>
        <a href="about.html">Qui sommes-nous</a>
        <a href="convoy.html">Convois</a>
        <a href="contact.html">Contact</a>
    </nav>

    <div class="status">
        <span class="dot"></span>
        Recrutement ouvert
    </div>

</header>

<!-- CONTACT -->
<section class="contact">

    <div class="contact-box">

        <h1>Contact</h1>

        <form>
            <input type="text" placeholder="Ton nom">
            <input type="email" placeholder="Ton email">
            <textarea placeholder="Ton message"></textarea>
            <button type="submit">Envoyer</button>
        </form>

        <div class="info">
            Réponse via Discord : discord.gg/tA7fWf3BPH
        </div>

    </div>

</section>

</body>
</html>
