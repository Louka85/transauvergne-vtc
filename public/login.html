<!DOCTYPE html>
<html>
<head>
<title>Connexion</title>
</head>

<body style="background:#0f0f0f;color:white;text-align:center;padding-top:100px;">

<h2>Connexion</h2>

<input type="text" id="username" placeholder="Nom d'utilisateur"><br><br>
<input type="password" id="password" placeholder="Mot de passe"><br><br>

<button onclick="login()">Connexion</button>

<p id="error" style="color:red;"></p>

<script>
function login() {
  fetch("/login", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    credentials: "include",
    body: JSON.stringify({
      username: document.getElementById("username").value,
      password: document.getElementById("password").value
    })
  })
  .then(r => r.json())
  .then(data => {
    if (data.success) {
      window.location.href = "/admin";
    } else {
      document.getElementById("error").innerText = "Identifiants incorrects";
    }
  });
}
</script>

</body>
</html>
