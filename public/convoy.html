<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Convois</title>
<link rel="stylesheet" href="/style.css">
</head>

<body>

<header class="header">

<a href="index.html" class="logo">
  <img src="logo.jpeg">
  <span>TransAuvergne VTC</span>
</a>

<nav class="nav">
  <a href="index.html">Accueil</a>
  <a href="about.html">Qui sommes-nous</a>
  <a href="convoy.html">Convois</a>
  <a href="contact.html">Contact</a>
  <a href="/conducteur">espace Conducteur</a>
</nav>

<div class="status">
  <span class="dot"></span>
  Convois actifs
</div>

<div class="mobile-btn" onclick="toggleMenu()">☰</div>

</header>

<div id="mobileMenu" class="mobile-menu">
  <a href="index.html">Accueil</a>
  <a href="about.html">Qui sommes-nous</a>
  <a href="convoy.html">Convois</a>
  <a href="contact.html">Contact</a>
  <a href="/conducteur">espace Conducteur</a>
</div>

<div class="container">
  <h1>Nos convois</h1>
  <div id="convoyList" class="grid"></div>
</div>

<script>

function toggleMenu(){
  const m = document.getElementById("mobileMenu");
  m.style.display = m.style.display === "flex" ? "none" : "flex";
}

/* ================= LOAD CONVOYS ================= */
function loadConvoys(){

  fetch("/api/convoys", { credentials:"include" })
  .then(r => r.json())
  .then(data => {

    if (!Array.isArray(data)) data = [];

    const el = document.getElementById("convoyList");
    el.innerHTML = "";

    data.forEach(c => {

      el.innerHTML += `
        <div class="card">

          <h2>${c.title ?? "Sans titre"}</h2>

          <p>📍 ${c.start ?? "?"} → ${c.end ?? "?"}</p>

          <p>📅 ${c.date ?? "?"}</p>
          <p>⏰ ${c.time ?? "?"}</p>

          <hr>

          <p>🖥️ Serveur : ${c.server ?? "Non défini"}</p>
          <p>🚛 Fret : ${c.cargo ?? "Non défini"}</p>
          <p>📏 Distance : ${c.distance ?? "Non définie"} km</p>
          <p>🏁 Rassemblement : ${c.meeting ?? "Non défini"}</p>
          <p>🕒 Heure rassemblement : ${c.meetingTime ?? "Non définie"}</p>
          <p>🗺️ DLC : ${c.dlc ?? "Aucun"}</p>

          <p>${c.description ?? ""}</p>

        </div>
      `;
    });
  })
  .catch(err => {
    console.error("Erreur API convoys :", err);
  });
}

/* INIT */
loadConvoys();

</script>

</body>
</html>
