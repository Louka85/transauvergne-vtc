<div class="container">
  <h1>Nos convois</h1>
  <div id="convoyList" class="grid"></div>
</div>

<script>
function toggleMenu(){
  const m = document.getElementById("mobileMenu");
  m.style.display = m.style.display === "flex" ? "none" : "flex";
}

function loadConvoys(){
  fetch("/api/convoys", { credentials:"include" })
  .then(r=>r.json())
  .then(data=>{
    if(!Array.isArray(data)) data = [];

    const el = document.getElementById("convoyList");
    el.innerHTML = "";

    data.forEach(c=>{
      el.innerHTML += `
      <div class="card">
    <h2>${c.title}</h2>

    <p>📍 ${c.start} → ${c.end}</p>

    <p>📅 ${c.date}</p>
    <p>⏰ ${c.time}</p>

    <p>🖥️ Serveur : ${c.server}</p>

    <p>🚛 Fret : ${c.cargo}</p>

    <p>📏 Distance : ${c.distance} km</p>

    <p>🏁 Rassemblement : ${c.meeting}</p>

    <p>🕒 Heure rassemblement : ${c.meetingTime}</p>

    <p>🗺️ DLC : ${c.dlc}</p>

    <p>${c.description}</p>
</div>`;
    });
  });
}  
loadConvoys();

console.log(convoys);
  
</script>
  
</body>
