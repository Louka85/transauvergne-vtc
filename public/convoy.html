<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Convois - TransAuvergne VTC</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f0f0f;
    color: white;
}

/* HEADER */
.header {
    position: fixed;
    top: 0;
    width: 100%;
    padding: 14px 30px;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    background: rgba(10,10,10,0.7);
    backdrop-filter: blur(10px);
    z-index: 1000;
    box-sizing: border-box;
}

/* LOGO PRO */
.logo {
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
    color: white;
    font-weight: bold;
}

.logo img {
    height: 40px;
    width: auto;
    object-fit: contain;
    transition: 0.2s;
}

.logo:hover img {
    transform: scale(1.05);
    filter: brightness(1.2);
}

.logo:hover span {
    color: #2ecc71;
}

/* NAV */
.nav {
    display: flex;
    justify-content: center;
    gap: 18px;
}

.nav a {
    color: #bdbdbd;
    text-decoration: none;
    font-size: 14px;
    transition: 0.2s;
}

.nav a:hover {
    color: white;
}

/* STATUS */
.status {
    justify-self: end;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    white-space: nowrap;
}

.dot {
    width: 8px;
    height: 8px;
    background: #2ecc71;
    border-radius: 50%;
    box-shadow: 0 0 10px #2ecc71;
}

/* PAGE */
.container {
    padding: 120px 30px 60px;
    max-width: 1000px;
    margin: auto;
}

h1 {
    text-align: center;
    margin-bottom: 40px;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 20px;
}

/* CARD */
.card {
    background: rgba(255,255,255,0.05);
    padding: 20px;
    border-radius: 12px;
    transition: 0.2s;
}

.card:hover {
    background: rgba(255,255,255,0.08);
}

/* TAG */
.tag {
    display: inline-block;
    margin-top: 10px;
    padding: 5px 10px;
    border-radius: 20px;
    font-size: 12px;
}

.tag.ouvert { background: rgba(46,204,113,0.15); color:#2ecc71; }
.tag.complet { background: rgba(241,196,15,0.15); color:#f1c40f; }
.tag.annule { background: rgba(231,76,60,0.15); color:#e74c3c; }

/* =========================
   RESPONSIVE MOBILE
========================= */

@media (max-width: 768px) {

    .header {
        flex-direction: column;
        align-items: flex-start;
        gap: 10px;
        padding: 12px 15px;
    }

    .nav {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
    }

    .nav a {
        font-size: 13px;
        margin: 0;
    }

    .logo {
        font-size: 14px;
    }

    .status {
        font-size: 12px;
    }

    /* TITRES */
    h1 {
        font-size: 28px !important;
    }

    /* ABOUT / TEXT */
    .about {
        padding: 100px 20px 40px;
    }

    .about p {
        font-size: 15px;
    }

    /* TEAM GRID */
    .team-grid {
        gap: 12px;
    }

    .card {
        width: 100%;
        max-width: 240px;
    }

    /* CONTACT */
    .contact {
        padding: 100px 15px 40px;
    }

    .contact-box {
        padding: 20px;
    }

    input, textarea {
        font-size: 14px;
    }

    button {
        font-size: 14px;
    }
}

</style>
</head>

<body>

<header class="header">

    <!-- LOGO IDENTIQUE PARTOUT -->
    <a href="index.html" class="logo">
        <img src="logo.jpeg" alt="logo">
        <span>TransAuvergne VTC</span>
    </a>

    <nav class="nav">
        <a href="index.html">Accueil</a>
        <a href="about.html">Qui sommes-nous</a>
        <a href="convoy.html">Convois</a>
        <a href="contact.html">Contact</a>
    </nav>

    <div class="status">
        <span class="dot"></span>
        Recrutement ouvert
    </div>

</header>

<div class="container">
    <h1>Nos convois</h1>
    <div id="convoyList" class="grid"></div>
</div>

<script>
function loadConvoys() {
    fetch("/api/convoys", { credentials: "include" })
    .then(r => r.json())
    .then(data => {

        if (!Array.isArray(data)) data = [];

        const container = document.getElementById("convoyList");
        container.innerHTML = "";

        data.sort((a, b) => new Date(a.date) - new Date(b.date));

        if (data.length === 0) {
            container.innerHTML = "<p style='text-align:center;color:#777'>Aucun convoi</p>";
            return;
        }

        data.forEach(c => {
            container.innerHTML += `
            <div class="card">
                <h2>${c.title}</h2>
                <p>📍 Départ : ${c.start}</p>
                <p>🎯 Destination : ${c.end}</p>
                <p>⏰ ${c.time}</p>
                <p>📅 ${c.date || "non défini"}</p>

                <span class="tag ${c.status || "ouvert"}">
                    ${c.status || "ouvert"}
                </span>
            </div>
            `;
        });

    })
    .catch(err => {
        console.log(err);
        document.getElementById("convoyList").innerHTML =
            "<p style='color:red;text-align:center'>Erreur API</p>";
    });
}

loadConvoys();
</script>

</body>
</html>
