<!DOCTYPE html>
<html lang="fr">
<head>
<link rel="stylesheet" href="style.css">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Convois - TransAuvergne VTC</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f0f0f;
    color: white;
}

/* HEADER */
.header {
    position: fixed;
    top: 0;
    width: 100%;
    padding: 14px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(10,10,10,0.75);
    backdrop-filter: blur(10px);
    z-index: 1000;
}

.logo {
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
    color: white;
    font-weight: bold;
}

.logo img { height: 38px; }

.nav a {
    color: #bdbdbd;
    margin: 0 10px;
    text-decoration: none;
}

.nav a:hover { color: white; }

.status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
}

.dot {
    width: 8px;
    height: 8px;
    background: #2ecc71;
    border-radius: 50%;
    box-shadow: 0 0 10px #2ecc71;
}

/* MOBILE */
.mobile-btn {
    display: none;
    font-size: 28px;
    cursor: pointer;
}

.mobile-menu {
    display: none;
    flex-direction: column;
    position: fixed;
    top: 65px;
    right: 15px;
    background: rgba(10,10,10,0.95);
    padding: 15px;
    border-radius: 12px;
    width: 200px;
}

.mobile-menu a {
    color: white;
    padding: 8px;
    text-decoration: none;
}

/* PAGE */
.container {
    padding: 120px 20px;
    max-width: 1000px;
    margin: auto;
}

h1 {
    text-align: center;
    margin-bottom: 30px;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 20px;
}

/* CARD */
.card {
    background: rgba(255,255,255,0.05);
    padding: 20px;
    border-radius: 12px;
    transition: 0.2s;
}

.card:hover {
    background: rgba(255,255,255,0.08);
}

/* TAG */
.tag {
    display: inline-block;
    margin-top: 10px;
    padding: 5px 10px;
    border-radius: 20px;
    font-size: 12px;
}

.tag.ouvert { background: rgba(46,204,113,0.15); color:#2ecc71; }
.tag.complet { background: rgba(241,196,15,0.15); color:#f1c40f; }
.tag.annule { background: rgba(231,76,60,0.15); color:#e74c3c; }

/* RESPONSIVE */
@media (max-width:768px){
    .nav { display:none; }
    .mobile-btn { display:block; }
}
</style>
</head>

<body>

<header class="header">

    <a href="index.html" class="logo">
        <img src="logo.jpeg">
        <span>TransAuvergne VTC</span>
    </a>

    <nav class="nav">
        <a href="index.html">Accueil</a>
        <a href="about.html">Qui sommes-nous</a>
        <a href="convoy.html">Convois</a>
        <a href="contact.html">Contact</a>
    </nav>

    <div class="status">
        <span class="dot"></span>
        Recrutement ouvert
    </div>

    <div class="mobile-btn" onclick="toggleMenu()">☰</div>
</header>

<div id="mobileMenu" class="mobile-menu">
    <a href="index.html" onclick="toggleMenu()">Accueil</a>
    <a href="about.html" onclick="toggleMenu()">Qui sommes-nous</a>
    <a href="convoy.html" onclick="toggleMenu()">Convois</a>
    <a href="contact.html" onclick="toggleMenu()">Contact</a>
</div>

<div class="container">
    <h1>Nos convois</h1>
    <div id="convoyList" class="grid"></div>
</div>

<script>
function toggleMenu(){
    const m = document.getElementById("mobileMenu");
    m.style.display = m.style.display === "flex" ? "none" : "flex";
}

function loadConvoys() {
    fetch("/api/convoys", { credentials: "include" })
    .then(r => r.json())
    .then(data => {

        if (!Array.isArray(data)) data = [];

        const container = document.getElementById("convoyList");
        container.innerHTML = "";

        data.sort((a, b) => new Date(a.date) - new Date(b.date));

        if (data.length === 0) {
            container.innerHTML = "<p style='text-align:center;color:#777'>Aucun convoi</p>";
            return;
        }

        data.forEach(c => {
            container.innerHTML += `
            <div class="card">
                <h2>${c.title}</h2>
                <p>📍 Départ : ${c.start}</p>
                <p>🎯 Destination : ${c.end}</p>
                <p>⏰ ${c.time}</p>
                <p>📅 ${c.date || "non défini"}</p>

                <span class="tag ${c.status || "ouvert"}">
                    ${c.status || "ouvert"}
                </span>
            </div>
            `;
        });

    })
    .catch(err => {
        document.getElementById("convoyList").innerHTML =
            "<p style='color:red;text-align:center'>Erreur API</p>";
    });
}

loadConvoys();
</script>

</body>
</html>
