<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Connexion Conducteur - TransAuvergne VTC</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<header class="header">

<a href="index.html" class="logo">

<img src="logo.jpeg" alt="Logo">

<span>TransAuvergne VTC</span>

</a>


<div class="status">

<span class="dot"></span>

Espace Conducteur

</div>

</header>



<main class="driver-page">


<div class="driver-card login-card">


<h1>
🚛 Espace Conducteur
</h1>


<p>
Connecte-toi pour accéder à ton espace personnel.
</p>



<div class="login-form">


<input 
id="username"
placeholder="👤 Identifiant">


<input 
id="password"
type="password"
placeholder="🔒 Mot de passe">



<button onclick="login()">

Connexion

</button>



<p id="message"></p>


</div>


</div>


</main>



<script>

function login(){


fetch("/login",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

username:
document.getElementById("username").value,

password:
document.getElementById("password").value

})

})


.then(r=>r.json())


.then(data=>{


if(data.success){

window.location="/conducteur";

}

else{

document.getElementById("message").innerHTML =
"❌ Identifiants incorrects";

}


});


}

</script>


</body>

</html>
